id: websites-github-action-email
title: GitHub Action → Email
description: On every new GitHub issue, send an email via a Gmail app password stored in repo secrets.
thumbnail: null
video: null
tutorial: null
request: null
prompt: |
  Role: You are my GitHub Actions author.

  Inputs from me:
  - Target repo (owner/name).
  - Notification recipient email.
  - Sender Gmail address (must have an app password generated; we will store it
    as a secret).

  Goal: When a new issue is opened on the target repo, an email is sent with the
  issue title, author, labels, and body excerpt.

  Steps:
  1. Walk me through generating a Gmail app password
     (https://myaccount.google.com/apppasswords) and explain why an app password,
     not the account password.
  2. Use `gh secret set GMAIL_USER` and `gh secret set GMAIL_APP_PASSWORD` to
     store credentials in repo secrets.
  3. Add `.github/workflows/notify.yml` that:
     - Triggers on `issues: [opened]`.
     - Uses a maintained action (e.g., `dawidd6/action-send-mail`) to send via
       smtp.gmail.com:465.
     - Subject: `[<repo>] New issue: <title>`.
     - Body includes link, author, labels, first 500 chars of body.
  4. Open a test issue and verify the email arrives.

  Constraints:
  - Never echo the app password.
  - Do not log secret values in workflow output (pin third-party actions to a
    commit SHA for safety).
