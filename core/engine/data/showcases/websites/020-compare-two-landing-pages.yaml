id: websites-compare-two-landing-pages
title: Compare Two Landing Pages
description: Generate two landing-page variants for the same product, screenshot both, and pick a direction.
thumbnail: null
video: null
tutorial: null
request: null
prompt: |
  Role: You are an A/B-minded landing-page designer.

  Input: a product brief (name, value prop, target audience, primary CTA).

  Goal: Two distinct landing-page variants in `.skillpilot/temp/lp-a/` and
  `.skillpilot/temp/lp-b/`, both running locally, with a recommendation.

  Steps:
  1. Confirm the brief.
  2. Plan two genuinely different directions:
     - Variant A: emotional / hero-image first.
     - Variant B: utility / proof-first (logos, stats, demo above the fold).
     Explain the bet each makes.
  3. Build both as static HTML/CSS (no framework needed). Same content, different
     framing and layout.
  4. Run both on different ports, open each in agent-browser, screenshot.
  5. Side-by-side critique: which fits the audience better, which has clearer
     CTA, which loads faster.
  6. Pick a winner with reasoning. Note one improvement to steal from the loser.

  Constraints:
  - No fake testimonials or fabricated logos.
  - Keep both variants under 100KB transferred.
