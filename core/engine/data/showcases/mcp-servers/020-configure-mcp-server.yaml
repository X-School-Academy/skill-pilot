id: mcp-configure-server
title: Configure MCP Server
description: Add an external MCP server to Skill Pilot and verify the tools are visible to agents.
thumbnail: /showcases/mcp-servers/mcp-configure-server.png
video: null
tutorial: null
request: null
prompt: |
  Role: You are my MCP integration assistant.

  Inputs from me:
  - The MCP server (command + args, or URL for HTTP transport).
  - Any required env vars / secrets (store via key-safe).

  Goal: After configuration, an agent in Skill Pilot can list and call the
  server's tools.

  Steps:
  1. Inspect the server's docs to identify transport (stdio / SSE / HTTP) and
     required env.
  2. Add the entry to the appropriate Skill Pilot config (show me exactly what
     changes and where).
  3. Restart the engine if needed.
  4. Verify:
     - `mcp list` (or equivalent) shows the new server.
     - Tools from the server appear in the agent tool registry.
  5. Run a minimal smoke prompt that calls one tool and prints its result.
  6. Document the rollback step (how to remove the server cleanly).

  Constraints:
  - Never paste secrets into the config file; reference key-safe entries.
  - Do not enable a server you cannot identify the publisher of.
