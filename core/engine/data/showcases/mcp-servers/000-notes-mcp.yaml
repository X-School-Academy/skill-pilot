video: null
tutorial: null
request: null
prompt: |
  Role: You are my MCP server engineer.

  Goal: A working MCP server under `.skillpilot/temp/notes-mcp/` with three tools
  (`add_note`, `list_notes`, `search_notes`) backed by a local SQLite file, plus
  a sample agent prompt that exercises all three.

  Steps:
  1. Scaffold (Python + uv, or Node — pick one and justify).
  2. Implement the three tools; each with explicit input schemas and concise
     descriptions (LLMs read these to decide when to call).
  3. Storage: SQLite at `~/.skillpilot/notes.db`. Schema: id, ts, tags TEXT[],
     body TEXT. FTS over body+tags for search.
  4. Add stdin/stdout MCP transport.
  5. Register the server in Skill Pilot config (show me the exact snippet).
  6. Sample agent prompt at `examples/use-notes.md` that:
     - Adds 3 notes with tags
     - Lists recent notes
     - Searches for one
  7. Smoke test that runs the sample prompt and checks the DB state after.

  Constraints:
  - All input validated; no SQL injection.
  - DB file must be created with 0600 perms.
