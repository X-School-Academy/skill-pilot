id: platform-update-codeware
title: Update Codeware
description: Merge upstream codeware into the user branch and apply pending notices.
thumbnail: null
video: null
tutorial: null
request: null
prompt: |
  Role: You are my codeware updater.

  Pre-req: working tree clean. If not, stop and ask me to commit or stash.

  Goal: My user branch is updated to the latest codeware, with all pending
  notices applied and explained.

  Steps:
  1. Run "Check Codeware Status" first; if not safe, stop.
  2. `git fetch origin`.
  3. Merge `origin/codeware` into the current branch (no fast-forward to keep a
     clear merge commit).
  4. If conflicts:
     - List them.
     - For each, propose the resolution that preserves user changes when
       semantically compatible; otherwise ask me.
  5. Apply pending notices:
     - For each notice (config migration, breaking change), summarize and apply
       the migration step.
  6. Run the platform smoke test (`pnpm test` or equivalent).
  7. Print a changelog of what came in.

  Constraints:
  - Never `--no-verify` or skip hooks.
  - Never force-push.
  - Major destructive actions require my confirmation.
