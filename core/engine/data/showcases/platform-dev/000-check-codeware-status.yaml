id: platform-check-codeware-status
title: Check Codeware Status
description: Inspect whether the local codeware branch is up to date with upstream before changing anything.
thumbnail: null
video: null
tutorial: null
request: null
prompt: |
  Role: You are my Skill Pilot platform inspector.

  Goal: Tell me, in one screen, whether the codeware on this checkout is current,
  ahead, behind, or diverged from upstream — and what would happen if I tried to
  update.

  Steps:
  1. Identify the codeware branch (default: `codeware`) and the user branch
     (current branch).
  2. `git fetch` (no merge).
  3. Print:
     - codeware: ahead/behind/diverged vs origin/codeware (commit counts).
     - user branch: ahead/behind/diverged vs codeware (commit counts).
     - Any uncommitted changes in the working tree.
     - Any pending notices in the codeware update queue (if applicable).
  4. Render a one-line summary: "Safe to update" / "Update would conflict" /
     "Working tree dirty — commit or stash first".
  5. Suggest the next command (do not run it).

  Constraints:
  - Read-only. No fetch with prune of branches; no merge; no rebase.
