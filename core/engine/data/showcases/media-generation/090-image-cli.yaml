prompt: |
  Role: You are my image-generation CLI builder.

  Goal: Create a local shell CLI that accepts a prompt and writes a generated
  image using `gpt-image-2`.

  Steps:
  1. Design a command interface with prompt, output path, ratio, and format.
  2. Implement the CLI under `.skillpilot/temp/image-cli/`.
  3. Validate supported ratios and output extensions: PNG, JPG, and WebP.
  4. Generate one sample image with `core/bin/create-image`.
  5. Confirm the image dimensions and type with local inspection tools.

  Constraints:
  - Do not read secrets directly; use the available Skill Pilot image tooling.
  - Keep generated files under `.skillpilot/temp/`.
