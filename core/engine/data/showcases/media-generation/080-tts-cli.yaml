id: media-tts-cli
title: Create a TTS Shell CLI
description: Build a small shell command that turns text into MP3 or WAV narration using gpt-4o-mini-tts.
thumbnail: /showcases/media-generation/media-tts-cli.png
video: null
tutorial: null
request: null
prompt: |
  Role: You are my CLI tool builder.

  Goal: Create a local shell CLI that converts text into speech audio using
  `gpt-4o-mini-tts`, with MP3 and WAV output options.

  Steps:
  1. Design a simple command interface: input text, output path, voice, and format.
  2. Implement the CLI under `.skillpilot/temp/tts-cli/`.
  3. Add validation for empty text, unsupported formats, and missing output paths.
  4. Generate a short sample narration file and inspect it with `ffprobe`.
  5. Print usage examples for MP3 and WAV.

  Constraints:
  - Do not read secrets directly; use the available Skill Pilot audio tooling.
  - Keep generated audio under `.skillpilot/temp/`.
