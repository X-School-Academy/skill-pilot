prompt: |
  Create a kids audio book video about the story of "The Tortoise and the Hare".

  Make the story suitable for young children, with a warm narration style, gentle pacing, colorful storybook scenes, and a clear moral about patience and steady effort. Keep the adaptation original and avoid scary language.

  Before creating the final video, show me the planned scenes so I can review the story flow. Save the finished video and the reusable project files under `.skillpilot/temp/tortoise-hare-audio-book/`.
