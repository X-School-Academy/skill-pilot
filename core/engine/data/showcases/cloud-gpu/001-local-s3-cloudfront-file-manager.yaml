goals: |-
  - Build a local browser-based file manager for S3 files served through CloudFront.
  - Build an independent command-line tool for upload and delete automation.
  - Store local metadata in SQLite and reconcile it with S3 through a Sync action.
  - Document setup, configuration, and day-to-day use in a user manual.
