prompt: |-
  Build a local AWS S3 and CloudFront file manager.

  Use @workspace/vibe-coding/local-s3-cloudfront-file-manager/requirements.md as
  the product brief. The AWS credentials profile, S3 bucket, and CloudFront
  distribution have been set up; refer to
  @workspace/tasks/aws-credentials-s3-cloudfront/output.md and
  @workspace/tasks/aws-s3-cloudfront-public-file-storage/output.md for the AWS
  profile, bucket, and CloudFront setup details. Show me the
  implementation plan before coding, then build, run, test, and create the user
  manual requested in the brief.
