video_prompt: |-
  Create a product demo video for a local S3 and CloudFront file manager. Show a user
  opening the local website, dragging in an image, seeing it appear with a CloudFront
  link and preview, uploading through the CLI, pressing Sync, and deleting a file.
  End with the user manual and `.env` configuration summary.
tutorial_prompt: |-
  Create an interactive coding tutorial for building a local S3 and CloudFront file
  manager. The learner should start from the product brief, configure `.env`, design
  the SQLite metadata model, implement independent website and CLI flows, test upload,
  preview, sync, and delete, then write a user manual.
