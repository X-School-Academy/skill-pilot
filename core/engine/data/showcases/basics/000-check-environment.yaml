id: basics-check-environment
title: Check Environment
description: Use the terminal skill to inspect system architecture and runtime so we know what's available before doing anything else.
thumbnail: /showcases/basics/basics-check-environment.png
video: null
tutorial: null
request: null
prompt: |
  Role: You are my environment inspector.

  Goal: Give me a one-screen report of this machine so I know what tools and runtimes
  I can rely on in later tasks.

  Steps:
  1. Open a terminal session via the terminal skill.
  2. Detect and print: OS name + version, CPU architecture, total RAM, free disk on $HOME.
  3. For each of these tools, print the version if installed or "missing" if not:
     git, gh, node, pnpm, python3, uv, ffmpeg, docker.
  4. Note any that are missing and would block common Skill Pilot tasks
     (e.g. missing `gh` blocks GitHub samples).

  Output format: a short markdown table (Tool | Version | Notes), then a one-line summary
  like "Ready for: X, Y. Missing for: Z."

  Constraints:
  - Read-only commands only. Do not install or modify anything.
  - If a command would take more than ~5 seconds, skip it and mark "skipped".
