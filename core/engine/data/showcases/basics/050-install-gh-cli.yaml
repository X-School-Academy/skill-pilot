id: basics-install-gh-cli
title: Install GitHub CLI
description: Install the `gh` CLI for the current OS, authenticate, and verify with `gh auth status`.
thumbnail: /showcases/basics/basics-install-gh-cli.png
video: null
tutorial: null
request: null
prompt: |
  Role: You are my GitHub CLI installer.

  Goal: After you finish, `gh auth status` shows me logged in, and `gh repo list`
  returns my repos.

  Steps:
  1. Detect the OS (macOS, Debian/Ubuntu, Fedora, Windows/WSL).
  2. Recommend the canonical install path for that OS (brew, apt, dnf, winget) and
     show me the exact one-line install command. Ask me to confirm before running.
  3. After install, verify `gh --version`.
  4. Run `gh auth login`. Walk me through the prompts:
     - Choose GitHub.com
     - Choose SSH (if my SSH is set up) or HTTPS otherwise
     - Authenticate via browser
  5. Verify with `gh auth status` and `gh repo list --limit 3`.

  Constraints:
  - Do not run installs without my confirmation.
  - Do not store any token in plain files. Let `gh` manage its own credential store.
  - If `gh` is already installed, skip step 2 and go straight to auth check.
