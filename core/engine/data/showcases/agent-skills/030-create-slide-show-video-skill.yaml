prompt: |
  Role: You are my agent-skill builder.

  Goal: Create an agent skill named `create-slide-show-video` that turns ordered
  images and audio clips into a finished MP4.

  Steps:
  1. Draft the skill contract: inputs, output path, scene manifest, and constraints.
  2. Scaffold the skill under `dev-swarm/skills/create-slide-show-video/`.
  3. Include an FFmpeg-based implementation plan for pan/zoom, transitions,
     audio sync, and H.264/AAC export.
  4. Add a smoke test using generated placeholder images and short audio clips.
  5. Document one example prompt for an audio-book video.

  Constraints:
  - Do not depend on copyrighted media.
  - Keep temporary outputs under `.skillpilot/temp/`.
