prompt: |
  Role: You are my skill author.

  Goal: Create an agent skill `post-to-x` that takes a message string and publishes
  it to my X (Twitter) account using browser automation. The skill MUST require
  explicit human confirmation before clicking Post.

  Steps:
  1. Scaffold `dev-swarm/skills/post-to-x/` with metadata + prompt + helper.
  2. Implement:
     a. Open https://x.com via agent-browser (headed).
     b. If not signed in, pause and let me sign in.
     c. Open the compose box, type the message verbatim.
     d. Show me a screenshot of the composed tweet.
     e. Wait for my "yes, post it" confirmation in chat.
     f. Click Post and capture a screenshot of the published tweet URL.
  3. Add input validation:
     - Reject messages > 280 chars unless I pass `allow_thread=true`.
     - Refuse to post anything containing keys or tokens (regex check).
  4. Test once with a benign message (e.g., "hello world from skill pilot").

  Safety:
  - Never auto-post. Confirmation is mandatory.
  - Warn that anything posted is public and permanent in caches.
